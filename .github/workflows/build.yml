name: Package addon

on:
  push:
    branches:
      - master
    tags:
      - '*'
    paths-ignore:
      - '.github/**'
      - 'ldoc.ltp'

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
        group: packager

    steps:
      - name: Checkout addon
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run luacheck
        uses: BigWigsMods/luacheck@main
        with:
          args: -q

      - name: Update option files
        if: always()
        uses: BigWigsMods/luacheck@main
        with:
          run_luacheck: false
          custom_script: gen_option_values.lua
          custom_args: BigWigs.toc

      - name: Package
        uses: BigWigsMods/packager@master
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
